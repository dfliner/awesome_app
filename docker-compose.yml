version: "3.9"

services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  awesomeapp:
    build: .
    depends_on:
      - db
    env_file:
      - .env
    ports:
      - "${APP_PORT}:8000"
    restart: always

volumes:
  postgres_data:
